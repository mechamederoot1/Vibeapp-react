<!DOCTYPE html>
<html>
<head>
    <title>Test Auth</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>Test Authentication</h1>
    
    <div id="results"></div>
    
    <script>
    const API_BASE = 'http://localhost:8000/api';
    
    function log(message) {
        const div = document.getElementById('results');
        div.innerHTML += '<p>' + message + '</p>';
        console.log(message);
    }
    
    async function testAuth() {
        try {
            log('🔧 Creating test users...');
            
            // 1. Create test users
            const createUsersResponse = await axios.post(`${API_BASE}/dev/create-test-users`);
            log('✅ Test users created: ' + JSON.stringify(createUsersResponse.data, null, 2));
            
            // 2. Login with first user
            log('🔑 Logging in...');
            const loginResponse = await axios.post(`${API_BASE}/auth/login`, {
                email: 'maria.silva@email.com',
                password: 'senha123'
            });
            
            const token = loginResponse.data.access_token;
            log('✅ Login successful! Token: ' + token.substring(0, 50) + '...');
            
            // 3. Test authenticated request
            log('🧪 Testing story creation...');
            const storyResponse = await axios.post(`${API_BASE}/stories/`, {
                type: 'text',
                content: 'Test story content',
                privacy: 'public',
                duration: 24
            }, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            log('✅ Story created successfully: ' + JSON.stringify(storyResponse.data, null, 2));
            
        } catch (error) {
            log('❌ Error: ' + error.message);
            if (error.response) {
                log('Response status: ' + error.response.status);
                log('Response data: ' + JSON.stringify(error.response.data, null, 2));
            }
        }
    }
    
    // Run test on page load
    testAuth();
    </script>
</body>
</html>
